function Bar({poll,t,onVote,locking}){

function Feed({group,me,onErr,onResolved}){
  const [polls,setPolls]=useState(null),[tally,setTally]=useState({}),[filter,setFilter]=useState("all"),[creating,setCreating]=useState(false),[locking,setLocking]=useState(null);
  const mounted=useRef(true);
  useEffect(()=>{mounted.current=true;return()=>{mounted.current=false;};},[]);
  const load=async()=>{
    const{data,error}=await SB.from("polls").select("id,subject,type,question,status,closes_at,author_id,resolved_outcome,force_proof").eq("group_id",group.id).order("created_at",{ascending:false});
    if(!mounted.current)return;
    if(error)return onErr(error.message);
    setPolls(data||[]);
    if(data&&data.length){const ids=data.map(p=>p.id);const{data:v}=await SB.from("votes").select("poll_id,choice,voter_id").in("poll_id",ids);
      if(!mounted.current)return;
      const tt={};(v||[]).forEach(r=>{tt[r.poll_id]=tt[r.poll_id]||{yes:0,no:0,mine:null};tt[r.poll_id][r.choice]++;if(r.voter_id===me.id)tt[r.poll_id].mine=r.choice;});setTally(tt);}
    else setTally({});
  };
  useEffect(()=>{load();},[group.id]);
  const vote=async(poll,choice)=>{
    if(locking)return;                       // one bet locks at a time — no concurrent-vote race
    SND.lock(); setLocking(poll.id);
    const t0=Date.now();
    const{error}=await SB.rpc("cast_vote",{p_poll:poll.id,p_choice:choice});
    const wait=Math.max(0,650-(Date.now()-t0)); await new Promise(r=>setTimeout(r,wait));
    if(!mounted.current)return;
    setLocking(null);
    if(error)return onErr(error.message);
    await load();
  };
  const resolve=async(poll,auto)=>{
    const outcome=window.prompt("מה קרה בפועל? כתוב כן או לא:", "כן"); if(!outcome)return;
    const o=(outcome.trim()==="כן"||outcome.trim().toLowerCase()==="yes")?"yes":"no";
    const{error}=await SB.rpc("resolve_poll",{p_poll:poll.id,p_outcome:o,p_void:false,p_proof:null});
    if(!mounted.current)return;
    if(error)return onErr(error.message);
    const mine=(tally[poll.id]||{}).mine; const won=mine===o;   // celebrate ONLY a real win — never a loss
    if(won){ SND.win(); onResolved(true); } else { SND.tap(); onResolved(false); }
    await load();
  };
  if(creating)return <CreatePoll group={group} onDone={()=>{setCreating(false);load();}} onCancel={()=>setCreating(false)} onErr={onErr}/>;
  if(polls===null)return <Spinner label="טוען הימורים…"/>;
  const list=polls.filter(p=>p.status!=="void"&&(filter==="all"||p.subject===filter));
  let hottestId=null,hn=2;
  list.forEach(p=>{if(p.status==="open"){const n=(tally[p.id]||{yes:0,no:0}).yes+(tally[p.id]||{yes:0,no:0}).no;if(n>hn){hn=n;hottestId=p.id;}}});
  return <div>
    <button className="btn btn-pri" onClick={()=>{SND.tap();setCreating(true);}} style={{marginBottom:13}}>🎰 שים הימור חדש</button>
    <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4,marginBottom:13,scrollbarWidth:"none"}}>
      {["all",...SK].map(k=><button key={k} className={"chip"+(filter===k?" on":"")} onClick={()=>setFilter(k)}>{k==="all"?"🎲 הכל":slabel(k)}</button>)}
    </div>
    {list.length===0&&<div className="card" style={{color:"var(--muted)",fontSize:13.5,textAlign:"center"}}>🎲 עוד אין הימורים בנושא הזה. תהיה הראשון!</div>}
    {list.map(p=><PollCard key={p.id} poll={p} t={tally[p.id]||{yes:0,no:0,mine:null}} me={me} onVote={vote} onResolve={resolve} locking={locking===p.id} featured={p.id===hottestId}/>)}
  </div>;
}
function CreatePoll({group,onDone,onCancel,onErr}){
  const DUR=[{l:"שעה",h:1},{l:"6 שעות",h:6},{l:"יום",h:24},{l:"3 ימים",h:72},{l:"שבוע",h:168}];
  const [q,setQ]=useState(""),[subject,setSubject]=useState("sport"),[dur,setDur]=useState(24),[busy,setBusy]=useState(false);
  const submit=async()=>{if(q.trim().length<5)return;setBusy(true);

    <div style={{fontSize:12.5,fontWeight:700,color:"var(--muted)",marginBottom:8}}>נושא</div>
    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:18}}>{SK.map(k=><button key={k} className={"chip"+(subject===k?" on":"")} onClick={()=>setSubject(k)}>{slabel(k)}</button>)}</div>
    <div style={{fontSize:12.5,fontWeight:700,color:"var(--muted)",marginBottom:8}}>מתי נסגר?</div>
    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:18}}>{DUR.map(d=><button key={d.h} className={"chip"+(dur===d.h?" on":"")} onClick={()=>setDur(d.h)}>{d.l}</button>)}</div>
    <button className="btn btn-pri" disabled={busy||q.trim().length<5} onClick={submit}>🎰 שים את ההימור</button>
  </div>;

function Ranks({group,onErr}){
  const [sub,setSub]=useState("total"),[rows,setRows]=useState(null);

    if(error)return onErr(error.message);
    const by={};(data||[]).forEach(r=>{const k=r.profile_id;by[k]=by[k]||{id:k,name:r.profiles?r.profiles.display_name:"—",total:0,s:{}};by[k].s[r.subject]=r.points;by[k].total+=r.points;});
    setRows(Object.values(by));})();},[group.id]);
  if(rows===null)return <Spinner label="טוען דירוג…"/>;
  const ranked=[...rows].sort((a,b)=>(sub==="total"?b.total-a.total:(b.s[sub]||0)-(a.s[sub]||0)));

    <div style={{display:"flex",justifyContent:"center",marginBottom:16}}><Avatar p={preview} size={76}/></div>
    <div style={{fontSize:12.5,fontWeight:700,color:"var(--muted)",marginBottom:6}}>שם</div>
    <input className="in" value={name} onChange={e=>setName(e.target.value)} maxLength={24} style={{marginBottom:16}}/>
    <div style={{fontSize:12.5,fontWeight:700,color:"var(--muted)",marginBottom:8}}>בחר אווטאר</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:7,marginBottom:16}}>
      {AVATARS.map(a=><button key={a} onClick={()=>{setAvatar(a);setUrl("");}} style={{fontSize:21,padding:"5px 0",borderRadius:11,cursor:"pointer",border:"1px solid "+((avatar===a&&!url.trim())?"var(--brand)":"var(--line)"),background:(avatar===a&&!url.trim())?"var(--brand-soft)":"var(--ink-3)"}}>{a}</button>)}
    </div>
    <div style={{fontSize:12.5,fontWeight:700,color:"var(--muted)",marginBottom:6}}>או הדבק קישור לתמונה (לא חובה)</div>
    <input className="in" placeholder="https://…" value={url} onChange={e=>setUrl(e.target.value)} style={{marginBottom:url.trim()&&!validUrl?6:16}}/>
    {url.trim()&&!validUrl&&<div style={{fontSize:11.5,color:"var(--gold)",fontWeight:600,marginBottom:14}}>הקישור צריך להתחיל ב‑http:// או https:// — אחרת נשתמש באווטאר שבחרת</div>}
    {lerr&&<div className="err">{lerr}</div>}
    <button className="btn btn-pri" disabled={busy} onClick={save}>{busy?"שומר…":"💾 שמור שינויים"}</button>
  </div></div>;
}

/* ---------- rules ---------- */
function Rules(){
  const row=(k,v)=><div style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid var(--line)"}}><span style={{fontSize:13.5,color:"var(--muted)"}}>{k}</span><span className="tnum" style={{fontWeight:800,color:"var(--gold)"}}>{v}</span></div>;
  return <div>
    <div className="card"><div style={{fontWeight:800,fontSize:16,marginBottom:8}}>🎰 איך צוברים</div>
      {row("ניחוש נכון","+5")}{row("נכון ובמיעוט (49% ומטה)","+3")}{row("3 ברצף","+4")}{row("5 ברצף","+5")}{row("טעות","0")}
      <div style={{display:"flex",justifyContent:"space-between",padding:"9px 0"}}><span style={{fontSize:13.5,color:"var(--muted)"}}>לכל קבוצה עונה של 30 יום, ואז איפוס</span><span style={{color:"var(--brand-2)",fontWeight:800}}>↻</span></div></div>
    <div className="card"><div style={{fontWeight:800,fontSize:16,marginBottom:8,color:"var(--no)"}}>✓ מותר</div><ul style={{margin:0,paddingInlineStart:18,color:"var(--muted)",fontSize:13.5,lineHeight:1.9}}><li>הימורים על אירועים שאפשר לאמת — נבדקים אוטומטית</li><li>הימור על אדם — רק באישורו</li><li>עד 40 בקבוצה, אתם בוחרים מתי נסגר</li></ul></div>
    <div className="card"><div style={{fontWeight:800,fontSize:16,marginBottom:8,color:"var(--yes)"}}>✕ אסור</div><ul style={{margin:0,paddingInlineStart:18,color:"var(--muted)",fontSize:13.5,lineHeight:1.9}}><li>תוכן משפיל / קללות</li><li>הצבעה על הימור שהוא עליך</li><li>כסף אמיתי — אין כזה, אף פעם</li></ul></div>
    <p style={{textAlign:"center",color:"var(--faint)",fontSize:11.5,fontWeight:700}}>נקודות בלבד · אף פעם לא כסף · לכל הגילאים</p>
  </div>;
}

/* ---------- groups sheet ---------- */
function GroupSheet({groups,current,onPick,onErr,onClose,reload}){
  const [mode,setMode]=useState("list"),[name,setName]=useState(""),[code,setCode]=useState(""),[busy,setBusy]=useState(false),[made,setMade]=useState(null);
  const create=async()=>{if(!name.trim())return;setBusy(true);const{data,error}=await SB.rpc("create_group",{p_name:name.trim()});setBusy(false);if(error)return onErr(error.message);SND.win();setMade(data);reload();};
  const join=async()=>{if(code.trim().length<4)return;setBusy(true);const{error}=await SB.rpc("join_group",{p_code:code.trim().toUpperCase()});setBusy(false);if(error)return onErr(error.message);SND.tap();setCode("");reload();setMode("list");};
  const wa=(g)=>{const txt=`בוא לקבוצה "${g.name}" ב‑Eyevos! קוד: ${g.invite_code}. ${REDIRECT}`;window.open("https://wa.me/?text="+encodeURIComponent(txt),"_blank");};
  return <div className="sheet" onClick={onClose}><div className="sheetcard" onClick={e=>e.stopPropagation()}><div className="grab"/>
    <h3 className="disp" style={{textAlign:"center",fontSize:20,fontWeight:800,margin:"0 0 16px"}}>קבוצות</h3>
    {made?<div style={{textAlign:"center"}}><div style={{fontSize:42}}>🎉</div><div style={{fontWeight:800,fontSize:18,margin:"4px 0"}}>הקבוצה נוצרה!</div><div className="disp tnum goldglow" style={{fontSize:28,fontWeight:900,color:"var(--brand-2)",letterSpacing:"3px",margin:"4px 0 14px"}}>{made.invite_code}</div>
      <button className="btn" style={{background:"#25D366",marginBottom:10}} onClick={()=>wa(made)}>הזמן בוואטסאפ</button>
      <button className="btn btn-pri" onClick={()=>{onPick(made);onClose();}}>כניסה לקבוצה</button></div>
    :mode==="list"?<>
      {groups.map(g=><div key={g.id} className="card" style={{display:"flex",alignItems:"center",gap:10,padding:12,borderColor:current&&current.id===g.id?"var(--brand)":"var(--line)"}}>
        <button onClick={()=>{onPick(g);onClose();}} style={{flex:1,display:"flex",alignItems:"center",gap:10,background:"none",border:"none",cursor:"pointer",textAlign:"start",color:"var(--text)",padding:0}}>
          <div style={{width:38,height:38,borderRadius:11,background:"var(--brand-soft)",display:"flex",alignItems:"center",justifyContent:"center"}}>👥</div>
          <div><div style={{fontWeight:800,fontSize:15}}>{g.name}</div><div className="tnum" style={{fontSize:12,color:"var(--muted)"}}>{g.invite_code}</div></div></button>
        <button onClick={()=>wa(g)} className="chip" style={{padding:8}} title="שיתוף בוואטסאפ">🟢</button></div>)}
      <button className="btn btn-pri" style={{marginTop:8,marginBottom:10}} onClick={()=>setMode("create")}>+ צור קבוצה</button>
      <button className="btn btn-ghost" onClick={()=>setMode("join")}>הצטרף עם קוד</button></>
    :mode==="create"?<>
      <button onClick={()=>setMode("list")} style={{background:"none",border:"none",color:"var(--muted)",fontWeight:700,cursor:"pointer",marginBottom:14,fontFamily:"inherit"}}>‹ חזרה</button>
      <input className="in" placeholder="שם הקבוצה" value={name} onChange={e=>setName(e.target.value)} style={{marginBottom:14}}/>
      <button className="btn btn-pri" disabled={busy||!name.trim()} onClick={create}>צור קבוצה</button></>
    :<><button onClick={()=>setMode("list")} style={{background:"none",border:"none",color:"var(--muted)",fontWeight:700,cursor:"pointer",marginBottom:14,fontFamily:"inherit"}}>‹ חזרה</button>
      <input className="in" placeholder="K7M2QX" value={code} onChange={e=>setCode(e.target.value.toUpperCase())} style={{marginBottom:14,textAlign:"center",letterSpacing:"2px",fontSize:18}}/>
      <button className="btn btn-pri" disabled={busy||code.trim().length<4} onClick={join}>הצטרף</button></>}
  </div></div>;
}

/* ---------- root ---------- */
function App(){
  const [session,setSession]=useState(undefined),[me,setMe]=useState(null),[groups,setGroups]=useState(null),[group,setGroup]=useState(null);
  const [tab,setTab]=useState("feed"),[err,setErr]=useState(null),[groupsOpen,setGroupsOpen]=useState(false),[celebrate,setCelebrate]=useState(false);
  const [scores,setScores]=useState({}),[total,setTotal]=useState(0),[snd,setSnd]=useState(SND.on);
  useEffect(()=>{SB.auth.getSession().then(({data})=>setSession(data.session||null));const{data:s}=SB.auth.onAuthStateChange((_e,ss)=>setSession(ss||null));return()=>s.subscription.unsubscribe();},[]);
  useEffect(()=>{if(!session){setMe(null);return;}SB.from("profiles").select("id,display_name,photo_url").eq("id",session.user.id).single().then(({data})=>setMe(data||{id:session.user.id,display_name:(session.user.email||"שחקן").split("@")[0]}));},[session]);
  const loadGroups=async()=>{const{data,error}=await SB.from("groups").select("id,name,invite_code").order("created_at");if(error){setErr(error.message);return;}const list=data||[];setGroups(list);setGroup(g=>(g&&list.some(x=>x.id===g.id))?g:(list[0]||null));};
  useEffect(()=>{if(me)loadGroups();},[me]);
  const loadScores=async()=>{if(!group||!me)return;const{data}=await SB.from("member_scores").select("subject,points").eq("group_id",group.id).eq("profile_id",me.id);const s={};let t=0;(data||[]).forEach(r=>{s[r.subject]=r.points;t+=r.points;});setScores(s);setTotal(t);};
  useEffect(()=>{loadScores();},[group,me]);
  const onErr=(m)=>{setErr(m);setTimeout(()=>setErr(null),5000);};
  const signOut=async()=>{await SB.auth.signOut();setGroup(null);setGroups(null);};
  const onResolved=(won)=>{loadScores();if(won){setCelebrate(true);setTimeout(()=>setCelebrate(false),1500);}};

  if(session===undefined)return <div className="stage"><div className="device"><Spinner label="מתחבר…"/></div></div>;
  if(!session)return <div className="stage"><div className="device"><Coins/><SignIn/></div></div>;
  if(!me||groups===null)return <div className="stage"><div className="device"><Spinner/></div></div>;

  return <div className="stage"><div className="device">
    {celebrate&&<Confetti/>}
    <div className="topbar"><div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}><span className="disp" style={{fontSize:20,fontWeight:900}}>Eyevos<span style={{color:"var(--yes)"}}>.</span></span><span className="livebadge"><span className="livedot"/> LIVE</span></div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <button onClick={()=>setSnd(SND.toggle())} className="chip" style={{padding:"6px 9px",fontSize:14}} title="צליל">{snd?"🔊":"🔇"}</button>
        {tab==="feed"&&group&&<button className="chip" onClick={()=>setGroupsOpen(true)} style={{padding:"5px 10px",fontSize:12}}>👥 {group.name} ›</button>}
        <span className="pill" style={{fontSize:13}}>🏆 <CountUp value={total}/></span>
      </div></div>
      {tab==="feed"&&<p className="disp" style={{fontSize:24,fontWeight:900,margin:"12px 0 0"}}>תהמר. תנצח.<br/>על <span className="jackpot">0 ₪</span>.</p>}
      {tab==="board"&&<p className="disp" style={{fontSize:22,fontWeight:800,margin:"12px 0 0"}}>מי המלך של הזירה? 👑</p>}
      {tab==="rules"&&<p className="disp" style={{fontSize:22,fontWeight:800,margin:"12px 0 0"}}>חוקים</p>}
      {tab==="profile"&&<p className="disp" style={{fontSize:22,fontWeight:800,margin:"12px 0 0"}}>הפרופיל שלי</p>}
    </div>
    <div className="scroll">
      {err&&<div className="err">{err}</div>}
      {!group?
        <div style={{textAlign:"center",padding:"30px 0"}}><div style={{fontSize:44,marginBottom:10}}>🎲</div><p style={{fontWeight:800,fontSize:17}}>אין לך עדיין קבוצה</p><p style={{color:"var(--muted)",fontSize:13.5,marginBottom:16}}>צור קבוצה או הצטרף עם קוד כדי להתחיל להמר.</p><button className="btn btn-pri" onClick={()=>setGroupsOpen(true)} style={{maxWidth:260,margin:"0 auto"}}>+ צור / הצטרף לקבוצה</button></div>
        :tab==="feed"?<Feed group={group} me={me} onErr={onErr} onResolved={onResolved}/>
        :tab==="board"?<Ranks group={group} onErr={onErr}/>
        :tab==="rules"?<Rules/>
        :<Profile group={group} me={me} total={total} scores={scores} onSignOut={signOut} onUpdated={setMe}/>}
    </div>
    <div className="nav">
      <button className={"navb"+(tab==="feed"?" on":"")} onClick={()=>setTab("feed")}>🏠 פיד</button>
      <button className={"navb"+(tab==="board"?" on":"")} onClick={()=>setTab("board")}>🏆 דירוג</button>
      <button className="fab" onClick={()=>setTab("feed")}>+</button>
      <button className={"navb"+(tab==="rules"?" on":"")} onClick={()=>setTab("rules")}>📖 חוקים</button>
      <button className={"navb"+(tab==="profile"?" on":"")} onClick={()=>setTab("profile")}>👤 אני</button>
    </div>
    {groupsOpen&&<GroupSheet groups={groups} current={group} onPick={(g)=>{setGroup(g);setTab("feed");}} onErr={onErr} onClose={()=>setGroupsOpen(false)} reload={loadGroups}/>}
  </div></div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
